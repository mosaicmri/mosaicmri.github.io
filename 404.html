<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MosaicMRI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #122033;
      --muted: #55657a;
      --accent: #00206f;
      --border: #d9e0ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #fbfcff 0%, #eef2f9 100%);
      color: var(--text);
    }
    .card {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 18px 60px rgba(0, 24, 74, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
      color: var(--accent);
    }
    p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Site Temporarily Unavailable</h1>
    <p>
      The MosaicMRI website is temporarily offline. Please check back later.
    </p>
  </main>
</body>
</html>
